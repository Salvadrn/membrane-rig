# =============================================================================
# Membrane permeability test rig — configuration
# All parameters here can be changed WITHOUT editing code.
# Every pressure value is expressed in `units` (kPa or psi); the software
# converts everything to kPa internally.
# =============================================================================

units: kPa            # kPa or psi  -> unit for every pressure below + the UI
mode: sim             # sim | hardware   (sim runs the whole logic with no I/O)

# ------------------------------------------------------------------ sensor ---
sensor:
  # Front-end type (only used in hardware mode):
  #   current_loop    -> 4-20 mA sensor read as voltage across a shunt resistor
  #   voltage_divider -> 0.5-4.5 V (or 0-5V) sensor scaled into the ADS1115 range
  # The chosen transducer is a 0.5-4.5 V unit -> voltage_divider. Power the
  # ADS1115 at 3.3 V and use a 10k/20k divider (4.5 V -> ~3.0 V) so the signal
  # never exceeds the ADC input. Do NOT feed 0.5-4.5 V straight in.
  type: voltage_divider   # sensor is 0.5-4.5 V ratiometric -> MUST divide, not raw
  range_min: 0.0       # kPa at 0.5 V
  range_max: 103.4     # kPa at 4.5 V  (0-15 PSI sensor = 0-103.4 kPa; tests top out ~60 kPa)

  # ADS1115
  ads_channel: 0       # single-ended channel A0..A3
  ads_gain: 1          # 1 -> +/-4.096 V full scale (see README)
  read_hz: 20

  # --- current_loop front-end ---
  # 4-20 mA through a precision shunt. With 150 ohm: 4mA->0.60V, 20mA->3.00V,
  # comfortably inside the ADS1115 +/-4.096V range at gain 1.
  shunt_ohms: 150.0
  signal_min: 0.004    # A  (4 mA)
  signal_max: 0.020    # A  (20 mA)

  # --- voltage_divider front-end ---
  # A 0.5-4.5V sensor exceeds the ADS1115 input at a 3.3V supply, so divide it.
  # divider_ratio = R2/(R1+R2). With R1=10k, R2=20k -> 0.667: 4.5V -> ~3.0V.
  divider_ratio: 0.667
  v_signal_min: 0.5    # V at range_min
  v_signal_max: 4.5    # V at range_max

# ----------------------------------------------------------- prop. valve ---
# Pressure-control valve. command 0..100 == "pressure authority":
#   0   -> LOWEST pressure  (== SAFE state)
#   100 -> HIGHEST pressure
# THIS RIG: air-over-water. Compressed AIR pressurises the vessel; a servo turns
# the EXISTING stainless NEEDLE VALVE on the air inlet (the one the operator
# turns by hand today). Opening it admits air -> pressure UP; closing holds/lets
# it drift down as water permeates. So:
#   0%  -> needle CLOSED -> lowest pressure (SAFE)
#   100% -> needle OPEN   -> highest pressure
# The needle valve is multi-turn, but a servo only spans <1 turn — that's fine:
# calibrate servo_min_us/max_us to the useful sub-range AROUND your setpoints
# (find it with the static valve-authority sweep). If closing is too slow to
# reject an overshoot, add a tiny fixed bleed orifice on the air line.
# type: servo  -> a servo turning the existing needle valve
# type: pwm    -> a MOSFET-driven proportional solenoid (see src/hal/pwm_valve.py)
valve:
  type: servo
  invert: false        # set true if the servo turns the needle the other way
  min_command: 0.0
  max_command: 100.0

  # --- servo on the air-inlet needle valve (type: servo) ---
  # Calibrate the endpoints to the needle's useful sub-range (NOT hard stops -
  # over-driving stalls/cooks the servo). Servo needs its OWN 5-6V supply (UBEC),
  # not the Pi rail; it holds position on power loss, so the mechanical relief
  # valve is the hardware failsafe.
  servo_pin: 18        # BCM hardware-PWM pin: 12, 13, 18 or 19
  servo_min_us: 700    # pulse (us) at 0%   -> LOWEST pressure (inline: closed / bleed: open)
  servo_max_us: 2300   # pulse (us) at 100% -> HIGHEST pressure (inline: open / bleed: closed)

  # --- proportional solenoid (type: pwm) ---
  pwm_pin: 18
  pwm_freq_hz: 1000

# --------------------------------------------------------------- diverter ---
# 3-way solenoid. De-energised = waste/bypass (fail-safe). Energise to collect.
diverter:
  pin: 23              # BCM
  active_high: true    # true: GPIO HIGH energises the coil (via driver)

# -------------------------------------------------------------------- pid ---
# Tuned (in sim) for the ASYMMETRIC plant: strong D + soft I + setpoint ramp =
# approach from below without overshoot (overshoot is expensive: pressure only
# falls by slow permeation). The derivative is low-pass filtered inside the PID
# so sensor noise doesn't shake the servo. Re-verify on the real rig.
pid:
  kp: 4.0
  ki: 0.4
  kd: 1.0
  output_min: 0.0
  output_max: 100.0
  sample_hz: 20

# ----------------------------------------------------------------- safety ---
safety:
  max_pressure: 80.0       # HARD cutoff -> vent + abort if exceeded
  min_plausible: -5.0      # below this the sensor is considered faulted
  max_plausible: 105.0     # above sensor full-scale -> faulted
  fault_grace_reads: 3     # consecutive bad reads before declaring a fault
  # While a test runs, the cutoff tightens to max(setpoint) + this margin. A
  # 20 kPa test then aborts near 30 kPa instead of coasting to 80 — the whole
  # point being that a delicate mesh must never see pressure it wasn't asked
  # to see. 0 disables (the global cutoff governs).
  overshoot_margin: 10.0

# ------------------------------------------------------------------- test ---
test:
  # NOTE: with a servo + quarter-turn ball valve the achievable band is coarse
  # (~10-15%), not 2%. Keep tolerance_pct >= the band the valve can actually hold
  # or the sequencer will never enter COLLECTING (it will time out every setpoint).
  # The permeability result is still valid: Q is regressed vs the MEASURED mean
  # pressure per point, so a looser hold just adds scatter, not bias.
  tolerance_pct: 10.0        # +/- band as a % of the setpoint (coarse valve -> widen)
  dwell_s: 5.0               # must stay inside the band this long before collecting
  collection_s: 60.0         # permeate collection duration
  stabilize_timeout_s: 180.0 # give up stabilising a setpoint after this long
  setpoints: [20, 40, 60]    # sequence of setpoints, in `units`
  # The rig rises fast but falls SLOWLY (closing the valve doesn't drop pressure
  # quickly — it only decays by permeation). So: run points low->high, and ramp
  # the PID target so it approaches each setpoint from below without overshoot.
  sort_ascending: true       # always run setpoints in ascending order
  ramp_kpa_s: 3.0            # PID-target ramp rate (0 = jump straight to setpoint)

# -------------------------------------------------------------------- sim ---
# First-order plant model used only in mode: sim. Lets you tune logic + PID
# on a laptop with no hardware. Values are in `units`.
sim:
  supply_pressure: 100.0   # compressor/reservoir pressure (mean)
  # The real compressor does NOT hold constant pressure — it cycles. This
  # wobbles the simulated supply so you can SEE the PID rejecting it.
  supply_wobble: 8.0       # +/- amplitude of the supply oscillation
  supply_wobble_period_s: 25
  # ASYMMETRIC plant (matches the real rig): opening the valve fills FAST, but
  # closing it only lets pressure decay SLOWLY through the membrane (no vent).
  # Rise ~seconds; fall tau ~ 1/k_drain (~20 s). Overshoot is expensive to undo.
  k_in: 0.3                # inflow gain at full open (fast rise)
  k_drain: 0.05            # permeation-only decay (slow fall)
  process_noise: 0.05      # plant noise (std)
  sensor_noise: 0.15       # measurement noise (std)
  # Simulated permeate flow so sim mode auto-produces a Darcy Q-vs-dP line.
  # Q(P) = flow_per_kpa_m3s * P_kPa + flow_intercept_m3s (+/- flow_noise_frac).
  flow_per_kpa_m3s: 7.86e-7
  flow_intercept_m3s: 1.3072e-5
  flow_noise_frac: 0.02

# ------------------------------------------------------------- membrane ---
# Geometry for the Darcy permeability calc (slope method):
#   k = slope * mu * L / A   (slope = dQ/dP in (m^3/s)/Pa)
#   mean hydraulic pore size  d = sqrt(32 * k)
# Change these per membrane / mesh you test. mu (viscosity) is NOT set here — it
# comes from the water temperature (see the `temperature` block below), because
# temperature is a test variable and mu depends on it.
membrane:
  area_cm2: 0.64           # membrane active area
  thickness_mm: 0.117      # membrane thickness L (avg of >=3 measured points)
  label: "60 mesh"
  # Pressure this SPECIMEN tolerates. Meshes are delicate and this sits well
  # below the vessel/safety limit. Nothing above it can be queued or started.
  # Editable per specimen from the web UI (it can only tighten, never loosen).
  max_pressure: 65.0

# ---------------------------------------------------------- temperature ---
# Water temperature = a test variable (distilled water; you vary the bath). mu is
# computed from it automatically: mu(T) = 2.414e-5 * 10^(247.8/(T_K-140)) Pa·s
# (20 C=1.00e-3, 25 C=8.9e-4). k should come out ~constant across temperature —
# a nice sanity check, since k is geometric and only Q and mu change with T.
temperature:
  source: manual           # "probe" (DS18B20 on GPIO4, auto-logs the real temp)
                           # or "manual" (use manual_c below)
  manual_c: 21.0           # water temperature (C) when source=manual / probe fallback
  w1_id: ""                # DS18B20 id e.g. "28-01abc"; empty = auto-detect
  read_period_s: 3.0       # how often to poll the probe (slow, off the control loop)

# ------------------------------------------------------------- analysis ---
analysis:
  auto_plot: true          # auto-fit Q vs dP + save PNG when a run finishes
  title: "Q vs ΔP"

# --------------------------------------------------------------- logging ---
logging:
  dir: runs
